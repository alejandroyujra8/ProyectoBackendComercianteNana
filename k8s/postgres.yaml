apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nana-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nana-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nana-postgres
  template:
    metadata:
      labels:
        app: nana-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: "12345678"
            - name: POSTGRES_DB
              value: comerciante_nana
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: nana-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nana-postgres
spec:
  selector:
    app: nana-postgres
  ports:
    - port: 5432
      targetPort: 5432
