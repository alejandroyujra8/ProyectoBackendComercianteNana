services:
  db:
    image: postgres:15
    container_name: nana_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: comerciante_nana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comerciante_nana"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./comerciante-nana-backend
    container_name: nana_backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345678
      DB_NAME: comerciante_nana
      TYPEORM_SYNCHRONIZE: "true"
      JWT_SECRET: "cambia_este_secreto_en_produccion"
      ADMIN_EMAIL: "admin@nana.com"
      ADMIN_PASSWORD: "Admin123!"
      RECAPTCHA_SECRET: "clave_recaptcha_dev"
      CORS_ORIGIN: "http://localhost"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: "http://localhost:3000"
        VITE_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
    container_name: nana_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
